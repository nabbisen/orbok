# orbok CI: fast gate + release gate (RFC-019 §7)
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  RUST_BACKTRACE: 1

jobs:
  # ── Fast gate: runs on every PR (< 5 min target) ──────────────────
  fast:
    name: Fast gate (fmt + clippy + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --exclude orbok --exclude orbok-ui --exclude orbok-bench -- -D warnings

      - name: unit tests (no GUI crates)
        env:
          ORBOK_DATA_DIR: /tmp/orbok-ci
        run: |
          cargo test --workspace \
            --exclude orbok \
            --exclude orbok-ui \
            --exclude orbok-bench \
            -- --test-threads=4

  # ── Release gate: runs on main and release branches ──────────────
  release:
    name: Release gate (full build + check + bench smoke)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: fast
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: feature matrix (tract)
        run: cargo check -p orbok-embed --features tract

      - name: strict clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: workspace library tests
        run: cargo test --workspace --lib

      - name: version and lockfile coherence
        run: cargo metadata --locked --no-deps --format-version 1 >/dev/null

      - name: build --release
        run: cargo build --release --package orbok

      - name: --version
        run: ./target/release/orbok --version

      - name: --check headless
        env:
          ORBOK_DATA_DIR: /tmp/orbok-release-check
        run: |
          rm -rf "$ORBOK_DATA_DIR"
          ./target/release/orbok --check

      - name: benchmark smoke (10 docs)
        env:
          ORBOK_DATA_DIR: /tmp/orbok-bench
        run: cargo test -p orbok-workers benchmark_corpus -- --nocapture

      - name: release archive checks
        run: |
          version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          test -n "$version"
          ./scripts/package.sh "$version"
          (
            cd dist
            sha256sum -c "orbok-v${version}.tar.gz.sha256"
          )
          tar tf "dist/orbok-v${version}.tar.gz" > target/release-archive-contents.txt
          grep -qx './Cargo.toml' target/release-archive-contents.txt
          grep -q '^./crates/' target/release-archive-contents.txt
          grep -q '^./rfcs/' target/release-archive-contents.txt
          grep -q '^./docs/' target/release-archive-contents.txt
          grep -q '^./scripts/' target/release-archive-contents.txt
          if grep -E '^\./(target|\.git|\.git-exclude|\.agents|\.codex|dist|docs/book)(/|$)|^\./Cargo\.lock$' target/release-archive-contents.txt; then
            echo "release archive contains forbidden paths" >&2
            exit 1
          fi

  # ── Security gate: mandatory on every PR ─────────────────────────
  security:
    name: Security gate (audit + security tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: install cargo-audit
        run: cargo install cargo-audit --quiet 2>/dev/null || true

      - name: audit dependencies
        run: cargo audit --deny warnings

      - name: security unit tests
        run: cargo test -p orbok-workers security -- --test-threads=1

  # ── Cross-platform smoke (RFC-019 §9) ────────────────────────────
  cross:
    name: Cross-platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: build core crates
        run: cargo build -p orbok-core -p orbok-db -p orbok-fs -p orbok-workers

      - name: test core crates
        env:
          ORBOK_DATA_DIR: /tmp/orbok-cross
        run: cargo test -p orbok-core -p orbok-db -p orbok-fs
